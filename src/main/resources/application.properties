server.port=${PORT:8080}
spring.application.name=profile
# Tell Spring to use H2 locally
spring.datasource.url=jdbc:h2:mem:profiledb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically create the database tables based on our Java code!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Enable the H2 web console so we can see our database in the browser
spring.h2.console.enabled=true
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}
github.redirect.uri=${GITHUB_REDIRECT_URI:https://hng-stage3-web-ten.vercel.app/auth/callback}

jwt.secret=a_very_long_and_very_secure_random_string_that_is_at_least_32_chars

